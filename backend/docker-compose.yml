services:
  db:
    image: postgres:16-alpine
    container_name: bet-mini-app-db
    environment:
      POSTGRES_DB: betapp
      POSTGRES_USER: betapp
      POSTGRES_PASSWORD: betapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betapp -d betapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    container_name: bet-mini-app-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
